# CTRL builtin keycap — "Assist" (default Irisy companion)
# Schema: ADR-024 v2 (6-axis composition model)
manifest_version = 2
builtin = true

[keycap]
id = "builtin/assist"
label = "Assist"
description = "Irisy's default companion mode. Active when no other keycap is invoked. Reads the whole vault, writes its own session state under keycaps/assist/."
pattern = "G"
color = "cobalt"

# ── Axis 1 — kernel capabilities ──────────────────────────────────────────
# assist reads the entire vault (so Irisy can answer questions about the
# user's notes) but only WRITES into its own sandbox folder. Read scope and
# write scope are independent (ADR-024 §2 axis 1 note).

[capabilities.clipboard]
read = true
write = true

[capabilities.text]
chat = true

[capabilities.file]
read_allowlist = ["${vault_root}/*"]
write_allowlist = ["${cap_asset.vault.path}/*"]

[capabilities.platform]
notify = true

# ── Axis 2 — brain capabilities ───────────────────────────────────────────
# text.chat only — assist is a conversational companion, no image/audio
# generation in the base persona. Provider follows the default fallback
# chain (ADR-011) unless the user pins one in Settings.

[brain_capabilities."text.chat"]
provider_pin = null   # null = fallback chain; explicit id = lock

# ── Axis 3 — MCP servers ──────────────────────────────────────────────────
# assist binds none directly. Other installed MCP keycaps (Pattern D) are
# discovered by Irisy at runtime via the kernel-as-MCP-server bridge.

# ── Axis 4 — skills ───────────────────────────────────────────────────────
# assist uses general conversation only — no SKILL.md recipes required.
# Specific behaviors (saving a reply, searching the vault) come from the
# keycap's persona + the kernel capability surface, not from skills.

# ── Axis 5 — UI surface ───────────────────────────────────────────────────
ui_surface = "chat-stream"

# ── Axis 6 — cap-asset (install-time provisioning) ────────────────────────

[cap_asset.files]
items = [
  { src = "icon.svg",   dest = "icon.svg" },
  { src = "persona.md", dest = "persona.md" },
]

[cap_asset.vault]
path = "keycaps/assist/"
seed = [
  { dest = "README.md",         content_inline = "# Assist (Irisy's default companion)\n\nThis is Irisy's default conversational keycap. Her chat history, saved replies, and session state live here.\n\n## Customizing Irisy's voice\n\nDrop a file called `persona.md` into this folder to override `assets/persona.md`. The runtime prefers your vault copy.\n" },
  { dest = "history/.gitkeep" },
  { dest = "saved-replies/.gitkeep" },
]
