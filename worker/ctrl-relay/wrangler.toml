# ctrl-relay — zero-knowledge WebSocket relay for CTRL remote windows.
# (ADR-005 §2 remote co-view, option B.)
# `.kiro/steering/development-philosophy.md` Hard Rules: no local
# `wrangler dev`; deploys go to *.workers.dev staging.

name = "ctrl-relay"
main = "src/index.ts"
compatibility_date = "2026-06-04"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "RELAY_ROOM"
class_name = "RelayRoom"

[[migrations]]
tag = "v1"
new_classes = ["RelayRoom"]

# Workers Logs (one-week retention) — enables `wrangler tail` after deploy.
[observability]
enabled = true
