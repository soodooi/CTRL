# Daily Note config — read by Irisy and the L2 "Today" shortcut.
# (ADR-002 substrate § vault v1 §8.4, 2026-06-01.)
#
# `path_template` placeholders:
#   {YYYY}  4-digit year   {MM}  zero-padded month   {DD}  zero-padded day
#
# Restoring the original — delete the file and the first-boot seed
# recreates it on the next launch.
version: 1
path_template: "daily/{YYYY}-{MM}-{DD}.md"
template: "templates/daily.md"
frontmatter_default:
  type: journal
  tags: [daily]
auto_create_on_first_write: false
