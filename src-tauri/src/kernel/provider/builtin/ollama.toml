# Ollama — local LLM runtime, verbatim VMark REST adapter.
#
# ADR-002 substrate § provider v2 §3.2: this manifest binds to the
# `rest_ollama` kind. Ollama is local-only by convention, so no api_key
# is required (auth.source = "none"). The default endpoint matches the
# Ollama default install (http://localhost:11434) and can be overridden
# in `~/.ctrl/providers/ollama.toml`.

id = "ollama"
label = "Ollama (local)"
kind = "rest_ollama"
endpoint = "http://localhost:11434"
# bao 2026-06-05: hermes3:8b first — bao explicitly retired qwen as
# default and pinned to hermes ollama (tool-calling tuned, ships with
# the CTRL bootstrap, ~5GB so fits 16GB M1 Pro). Adapter picks
# `models[0]` when the caller does not pin a model; putting the user's
# actually-pulled tag first means CTRL works out of the box without a
# Settings round-trip. Ollama tag resolution is exact (no :latest
# fallback), so the explicit `:8b` suffix is load-bearing. qwen2.5
# entries kept as fallbacks for users who already pulled them.
models = [
  "hermes3:8b",
  "qwen2.5:7b",
  "qwen2.5:14b",
  "llama3.2",
  "llama3.1",
  "mistral",
]
description = "Local Ollama runtime — 0 cost, runs entirely on your machine. Default endpoint http://localhost:11434."
capabilities = ["text.chat"]

[auth]
source = "none"
