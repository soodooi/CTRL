# Claude (OAuth subscription) — Claude Code CLI as a persistent
# subprocess. Uses the user's Claude Pro/Max subscription via the CLI's
# stored OAuth token; ANTHROPIC_API_KEY is stripped so we never bill the
# user's API account by accident.

id = "claude-oauth"
label = "Claude (OAuth subscription)"
kind = "cli_claude_persistent"
binary = "claude"
env_strip = ["ANTHROPIC_API_KEY"]
models = ["sonnet", "opus", "haiku"]
description = "Claude Code CLI — billed against your Claude.ai subscription. Run `claude login` once to authorize."
capabilities = ["text.chat"]

[auth]
source = "none"
