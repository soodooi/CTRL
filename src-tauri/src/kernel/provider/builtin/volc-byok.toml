# Volcano Ark / Doubao — user-elected BYOK slot.
#
# ADR-002 substrate § provider v2: Volc has two manifest ids to
# disambiguate dual identity introduced by the v2 amendment.
#
#   - `volc` (builtin/volc.toml)      = CTRL-managed irisy.fallback default.
#                                       CTRL pays the bill. User does not
#                                       configure this slot; it is seeded
#                                       automatically at boot.
#   - `volc-byok` (this file)         = user-elected. User pays. Keychain
#                                       account is distinct (`volc-byok`)
#                                       so the BYOK key never collides with
#                                       the CTRL-managed credential path.
#
# Other REST providers (anthropic-api / openai-api / kimi / deepseek /
# google) are pure BYOK only — no CTRL-managed twin manifest needed.

id = "volc-byok"
label = "Volcano Ark (your key)"
kind = "http_api"
shape = "openai_chat_completions"
endpoint = "https://ark.cn-beijing.volces.com/api/v3"
models = [
  "doubao-1-5-pro-32k-250115",
  "doubao-1-5-lite-32k-250115",
]
description = "Volcano Ark / Doubao with the user's own API key (BYOK). Bills go to the user's Volcengine account."
capabilities = ["text.chat"]

[auth]
source = "keychain"
account = "volc-byok"
