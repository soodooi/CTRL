# DeepSeek — primary OpenAI-shape endpoint. ADR-002 substrate § provider
# v3 amendment 2026-06-04 (bao directive: add deepseek endpoint, prefer
# mainline shape). Switched from the `/anthropic` compat path to the
# standard OpenAI chat.completions path so cherry-studio / NextChat /
# LobeHub-style clients reuse the same key without per-client shape
# negotiation. The Anthropic-shape path (`/anthropic`) still works
# server-side; users who prefer it can override via
# `~/.ctrl/providers/deepseek.toml` with shape = "anthropic_messages"
# and endpoint = "https://api.deepseek.com/anthropic".

id = "deepseek"
label = "DeepSeek"
kind = "http_api"
shape = "openai_chat_completions"
endpoint = "https://api.deepseek.com/v1"
models = ["deepseek-chat", "deepseek-reasoner"]
description = "DeepSeek via the OpenAI-compatible chat.completions endpoint (api.deepseek.com/v1)."
capabilities = ["text.chat"]

[auth]
source = "keychain"
account = "deepseek"
