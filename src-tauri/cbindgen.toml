# cbindgen config — generates C header from #[no_mangle] extern "C" functions
# in src/ffi/native.rs. Output: ctrl_native.h (placed at win/CTRL/Bindings/).
#
# Consumed by C# P/Invoke (win shell) and any C/C++ caller.

language = "C"
header = """/* SPDX-License-Identifier: All-Rights-Reserved
 * CTRL native C ABI — auto-generated by cbindgen.
 * DO NOT EDIT. Source: src-tauri/src/ffi/native.rs */"""
include_guard = "CTRL_NATIVE_H"
no_includes = false
sys_includes = ["stdint.h", "stdbool.h", "stddef.h"]
documentation = true
style = "type"

[export]
include = ["ctrl_native_*"]
prefix = ""

[export.rename]
"u32" = "uint32_t"
"i32" = "int32_t"
"u64" = "uint64_t"
"i64" = "int64_t"

[parse]
parse_deps = false
