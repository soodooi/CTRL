name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Nightly live smoke (needs network for market/web + a booted kernel).
    - cron: "0 6 * * *"

jobs:
  # --- deterministic per-push gate: unit tests + typecheck (no kernel/network) ---
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo test --lib
        run: cargo test --lib --manifest-path src-tauri/Cargo.toml

  web:
    runs-on: ubuntu-latest
    env:
      HUSKY: "0" # git-hook installer has no place in CI (npm ci runs `prepare`)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: install + typecheck
        working-directory: packages/ctrl-web
        run: |
          npm ci --ignore-scripts
          npx tsc --noEmit

  # --- live smoke: boot the headless kernel + run the master test's Part A ---
  # Opt-in (nightly / manual), NOT a per-push blocker: it needs a running kernel
  # + network (market/web). Part B (chat-turn E2E) additionally needs an LLM
  # provider key, so the default run is `--no-turns` (capability smoke).
  smoke:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: build headless kernel
        run: cargo build --bin ctrl_kernel --manifest-path src-tauri/Cargo.toml
      - name: boot kernel + run capability smoke
        run: |
          ./src-tauri/target/debug/ctrl_kernel &
          KPID=$!
          for i in $(seq 1 60); do
            [ -f "$HOME/.ctrl/state/gate-token" ] && \
              curl -sf -o /dev/null "http://127.0.0.1:17873/mcp" 2>/dev/null && break || true
            # the gate returns 400 to a bare GET but that means it's up
            if curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:17873/mcp | grep -qE '4|2'; then break; fi
            sleep 2
          done
          python3 scripts/debug/test_all.py --no-turns
          RC=$?
          kill $KPID 2>/dev/null || true
          exit $RC
